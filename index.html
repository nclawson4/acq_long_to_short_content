<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACQ Clipper — Coming Soon</title>
  <meta name="description" content="ACQ Clipper is coming soon." />
  <style>
    :root {
      color-scheme: dark;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(99, 102, 241, 0.18), transparent 60%),
        radial-gradient(800px 500px at 80% 110%, rgba(236, 72, 153, 0.12), transparent 60%),
        #0a0a0a;
    }
    main {
      text-align: center;
      max-width: 640px;
    }
    .badge {
      display: inline-block;
      padding: 0.35rem 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.55) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.65);
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #34d399;
      border-radius: 50%;
      margin-right: 0.5rem;
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <main>
    <span class="badge"><span class="dot"></span>In development</span>
    <h1>ACQ Clipper</h1>
    <p>Something new is on the way. Check back soon.</p>
  </main>
</body>
</html>
